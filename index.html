<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak - Syafrina dan Keluarga</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #000;
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
  }

  .card {
    position: relative;
    width: 100vw;
    height: 56.25vw; /* 16:9 */
    max-width: 1280px;
    max-height: 720px;
    overflow: hidden;
  }

  /* === ORIGINAL IMAGE === */
  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* === 1. GENTLE MOON GLOW — soft breathing light === */
  .moon-glow {
    position: absolute;
    top: 6%;
    right: 26%;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,248,220,0.18) 0%,
      rgba(255,248,220,0.06) 50%,
      transparent 75%
    );
    z-index: 1;
    pointer-events: none;
    animation: breathe 6s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.25); opacity: 0.85; }
  }

  /* === 2. STARS — only tiny subtle twinkles === */
  .star {
    position: absolute;
    width: var(--s);
    height: var(--s);
    background: #fff;
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    animation: softTwinkle var(--d) ease-in-out infinite;
    animation-delay: var(--dl);
  }
  @keyframes softTwinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--peak, 0.8); }
  }

  /* === 3. VERY SOFT LIGHT SWEEP — like moonlight moving === */
  .light-sweep {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
  }
  .light-sweep::after {
    content: '';
    position: absolute;
    top: -20%;
    left: -60%;
    width: 40%;
    height: 140%;
    background: linear-gradient(
      105deg,
      transparent 0%,
      rgba(255,255,255,0.02) 45%,
      rgba(255,255,255,0.04) 50%,
      rgba(255,255,255,0.02) 55%,
      transparent 100%
    );
    animation: sweep 10s ease-in-out infinite;
  }
  @keyframes sweep {
    0%   { left: -60%; }
    100% { left: 160%; }
  }

  /* === 4. GREETING TEXT === */
  .greeting {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    z-index: 10;
    padding: 20px 10% 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 60%, transparent 100%);
    opacity: 0;
    animation: fadeUp 2s 0.5s ease-out forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .greeting-line1 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(14px, 2.4vw, 24px);
    color: #fff;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    line-height: 1.5;
    letter-spacing: 0.5px;
  }
  .greeting-line2 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: clamp(11px, 1.6vw, 16px);
    color: #ede4c5;
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-top: 8px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }

  /* === 5. SUBTLE VIGNETTE === */
  .vignette {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.15) 100%);
  }
</style>
</head>
<body>

<div class="card" id="card">
  <!-- Original design — untouched -->
  <img src="eid-bg.jpeg" class="bg" alt="Eid Mubarak">

  <!-- Gentle moon glow -->
  <div class="moon-glow"></div>

  <!-- Soft light sweep -->
  <div class="light-sweep"></div>

  <!-- Vignette -->
  <div class="vignette"></div>

  <!-- Greeting -->
  <div class="greeting">
    <div class="greeting-line1">Minal 'Aidin wal-Faizin, Mohon Maaf Lahir dan Batin</div>
    <div class="greeting-line2">— Syafrina dan Keluarga —</div>
  </div>
</div>

<script>
// Generate subtle twinkling stars — only in the sky area
const card = document.getElementById('card');
const stars = [
  // Top-left sky area
  {x:4,y:8},{x:9,y:3},{x:14,y:18},{x:7,y:28},{x:20,y:10},
  {x:26,y:22},{x:33,y:6},{x:30,y:30},{x:16,y:40},
  // Top-center
  {x:40,y:4},{x:45,y:16},{x:50,y:8},{x:38,y:28},
  // Top-right (less dense — text area)
  {x:60,y:6},{x:68,y:3},{x:75,y:14},{x:82,y:6},
  {x:88,y:12},{x:92,y:4},{x:95,y:18},
  // Extra subtle ones
  {x:11,y:36},{x:22,y:44},{x:55,y:22},{x:65,y:18},
];

stars.forEach(pos => {
  const el = document.createElement('div');
  el.className = 'star';
  const size = (1 + Math.random() * 2).toFixed(1);
  const dur = (4 + Math.random() * 5).toFixed(1);
  const delay = (Math.random() * 8).toFixed(1);
  const peak = (0.4 + Math.random() * 0.5).toFixed(2);
  el.style.cssText = `
    left:${pos.x}%;
    top:${pos.y}%;
    --s:${size}px;
    --d:${dur}s;
    --dl:${delay}s;
    --peak:${peak};
  `;
  card.appendChild(el);
});
</script>
</body>
</html>
